<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel WO — Pernoite</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
.page{max-width:1800px;margin:0 auto;padding:1.25rem}

/* HEADER */
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem;flex-wrap:wrap;gap:1rem}
.header-left h1{font-size:22px;font-weight:500;color:#f8fafc}
.header-left p{font-size:12px;color:#475569;margin-top:3px}
.header-right{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.conn{display:flex;align-items:center;gap:6px;font-size:12px;color:#94a3b8;background:#1e293b;padding:6px 14px;border-radius:20px}
.conn-dot{width:7px;height:7px;border-radius:50%;background:#10b981}
.conn-dot.on{animation:blink 2s infinite}
.conn-dot.off{background:#ef4444;animation:none}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* KPIS */
.kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:1.25rem}
.kpi{background:#1e293b;border-radius:10px;padding:14px 16px;border:0.5px solid #334155}
.kpi-n{font-size:28px;font-weight:500;color:#f8fafc;line-height:1}
.kpi-l{font-size:11px;color:#64748b;margin-top:5px;text-transform:uppercase;letter-spacing:.5px}
.kpi.red .kpi-n{color:#f87171}
.kpi.red{border-color:#450a0a}

/* SUMMARY */
.summary{display:flex;gap:1.5rem;margin-bottom:1.25rem;padding:10px 16px;background:#1e293b;border-radius:8px;border:0.5px solid #334155;flex-wrap:wrap}
.sum-item{display:flex;align-items:center;gap:8px;font-size:12px;color:#94a3b8}
.sum-dot{width:8px;height:8px;border-radius:50%}

/* CONTROLS */
.controls{display:flex;gap:8px;flex-wrap:wrap}
.btn{padding:8px 18px;border-radius:8px;border:0.5px solid #334155;background:#1e293b;color:#94a3b8;font-size:13px;cursor:pointer;font-weight:500}
.btn:hover{background:#263348;color:#e2e8f0}
.btn.primary{background:#1d4ed8;border-color:#1d4ed8;color:#fff}
.btn.danger{background:#450a0a;border-color:#7f1d1d;color:#fca5a5}
#fileInput{display:none}

/* TABLE */
.tbl-wrap{background:#1e293b;border-radius:12px;border:0.5px solid #334155;overflow:hidden}
.tbl{width:100%;border-collapse:collapse}
.tbl th{font-size:10px;color:#475569;text-transform:uppercase;letter-spacing:.6px;padding:10px 14px;text-align:left;font-weight:500;border-bottom:0.5px solid #334155;background:#162032}
.tbl td{padding:9px 14px;border-bottom:0.5px solid #1e293b;vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}

/* LINHA AERONAVE */
.ac-row{cursor:pointer;transition:background .1s}
.ac-row:hover td{background:#162032}
.ac-row.finding td{background:#1a0a0a}
.ac-row.finding:hover td{background:#200d0d}
.arrow{font-size:10px;color:#475569;display:inline-block;transition:transform .25s;margin-right:6px}
.arrow.open{transform:rotate(90deg)}
.ac-code{font-weight:500;font-size:14px;color:#93c5fd;letter-spacing:.5px}
.ac-tech{font-size:11px;color:#64748b;margin-top:2px}
.wo-count{font-size:12px;color:#94a3b8}
.wo-list{font-size:11px;color:#64748b;max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.prog-cell{display:flex;align-items:center;gap:8px}
.prog-bar{width:70px;height:4px;background:#0f172a;border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:#10b981;transition:width .4s}
.prog-txt{font-size:11px;color:#94a3b8;min-width:30px;font-variant-numeric:tabular-nums}

/* BADGES */
.badge{display:inline-block;padding:3px 9px;border-radius:10px;font-size:10px;font-weight:500;white-space:nowrap}
.b-done{background:#052e16;color:#4ade80}
.b-started{background:#422006;color:#fbbf24}
.b-pending{background:#1e293b;color:#475569;border:0.5px solid #334155}
.b-finding{background:#450a0a;color:#f87171;animation:blink 1.5s infinite;border:0.5px solid #7f1d1d}
.mtl{display:inline-block;padding:3px 9px;border-radius:10px;font-size:10px;font-weight:500}
.mtl-ok{background:#052e16;color:#4ade80}
.mtl-nhe{background:#422006;color:#fbbf24}
.mtl-tst{background:#3b0764;color:#d8b4fe}
.mtl-nd{background:#1e293b;color:#334155;border:0.5px solid #334155}

/* DETALHE */
.detail-row td{padding:0;border-bottom:0.5px solid #334155}
.detail-inner{padding:0 14px 0 36px}
.task-item{border-bottom:0.5px solid #1e293b;padding:10px 0}
.task-item:last-child{border-bottom:none}
.task-header{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
.task-wo-num{font-size:12px;font-weight:500;color:#e2e8f0}
.task-desc{font-size:11px;color:#64748b;margin-bottom:8px;line-height:1.4}
.finding-item{font-size:11px;padding:3px 0}
.finding-item.open{color:#f87171}
.finding-item.resolved{color:#4ade80}

/* OBSERVAÇÕES */
.obs-area{margin-top:6px}
.obs-label{font-size:10px;color:#475569;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.obs-list{display:flex;flex-direction:column;gap:0}
.obs-entry{display:grid;grid-template-columns:44px 1fr;gap:8px;padding:5px 0;border-bottom:0.5px solid #1e293b;align-items:start}
.obs-entry:last-child{border-bottom:none}
.obs-time{font-size:10px;font-weight:500;color:#475569;font-variant-numeric:tabular-nums;padding-top:1px}
.obs-text{font-size:11px;color:#94a3b8;line-height:1.4}
.obs-text.lider{color:#60a5fa}

/* INPUT OBSERVAÇÃO DO LÍDER */
.obs-input-wrap{display:flex;gap:6px;margin-top:8px}
.obs-input{flex:1;padding:7px 10px;background:#0f172a;border:0.5px solid #334155;border-radius:7px;color:#e2e8f0;font-size:12px;font-family:inherit}
.obs-input:focus{outline:none;border-color:#3b82f6}
.obs-send{padding:7px 14px;background:#1d4ed8;border:none;border-radius:7px;color:#fff;font-size:12px;cursor:pointer;white-space:nowrap}
.obs-send:hover{background:#2563eb}
.obs-empty{font-size:11px;color:#334155;padding:4px 0}

/* FOOTER */
.tbl-footer{padding:8px 14px;font-size:11px;color:#334155;text-align:right;border-top:0.5px solid #334155}

/* LOADING */
.loading{text-align:center;padding:4rem;color:#475569}
.spinner{width:32px;height:32px;border:2px solid #334155;border-top-color:#3b82f6;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 1rem}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:4rem;color:#475569}

@media(max-width:900px){.kpis{grid-template-columns:repeat(3,1fr)}}
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <div class="header-left">
      <h1>✈ Painel WO — Pernoite</h1>
      <p>Clique em uma aeronave para expandir • Sincronizado em tempo real</p>
    </div>
    <div class="header-right">
      <div class="controls">
        <button class="btn primary" onclick="document.getElementById('fileInput').click()">📥 Importar Excel</button>
        <button class="btn" onclick="exportar()">📤 Exportar</button>
        <button class="btn" onclick="window.open('historico.html','_blank')" style="background:#1e293b;border-color:#334155">📋 Histórico</button>
        <button class="btn" onclick="encerrarTurno()" style="background:#422006;border-color:#92400e;color:#fbbf24">⏹ Encerrar Turno</button>
        <button class="btn danger" onclick="limpar()">🗑 Limpar</button>
      </div>
      <div class="conn">
        <div class="conn-dot off" id="cdot"></div>
        <span id="clabel">Conectando...</span>
      </div>
    </div>
  </div>
  <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" onchange="importar(event)">

  <div class="kpis">
    <div class="kpi"><div class="kpi-n" id="k-ac">—</div><div class="kpi-l">Aeronaves</div></div>
    <div class="kpi"><div class="kpi-n" id="k-total">—</div><div class="kpi-l">WOs total</div></div>
    <div class="kpi"><div class="kpi-n" id="k-done">—</div><div class="kpi-l">Concluídas</div></div>
    <div class="kpi"><div class="kpi-n" id="k-pct">—</div><div class="kpi-l">Progresso</div></div>
    <div class="kpi red"><div class="kpi-n" id="k-find">—</div><div class="kpi-l">Findings</div></div>
  </div>

  <div class="summary">
    <div class="sum-item"><div class="sum-dot" style="background:#10b981"></div><span id="s-done">—</span></div>
    <div class="sum-item"><div class="sum-dot" style="background:#fbbf24"></div><span id="s-and">—</span></div>
    <div class="sum-item"><div class="sum-dot" style="background:#475569"></div><span id="s-pend">—</span></div>
    <div class="sum-item"><div class="sum-dot" style="background:#f87171"></div><span id="s-find">—</span></div>
  </div>

  <div class="tbl-wrap">
    <table class="tbl">
      <thead>
        <tr>
          <th style="min-width:150px">Aeronave</th>
          <th>WOs</th>
          <th>Tarefas</th>
          <th style="min-width:120px">Progresso</th>
          <th>MTL</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="6"><div class="loading"><div class="spinner"></div><p>Conectando...</p></div></td></tr>
      </tbody>
    </table>
    <div class="tbl-footer" id="footer">—</div>
  </div>
</div>

<script>
const URL_='https://owyohcqjyiqhabonnstq.supabase.co';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im93eW9oY3FqeWlxaGFib25uc3RxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNjMxMzksImV4cCI6MjA5MzczOTEzOX0.nRpYEt7bZdJXCCyVKM5wZQOdo1DOH8oQIEu_swRizIA';
const sb=window.supabase.createClient(URL_,KEY);

// Estado dos painéis abertos
const openPanels = new Set();

function agora(){return new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});}

async function load(){
  try{
    const{data,error}=await sb.from('aircrafts')
      .select('*,tasks(*,findings(*),observations(*))')
      .order('code');
    if(error)throw error;
    render(data||[]);
    setConn(true);
  }catch(e){
    setConn(false);
    document.getElementById('tbody').innerHTML=
      `<tr><td colspan="6"><div class="empty">❌ Erro: ${e.message}</div></td></tr>`;
  }
}

function render(data){
  const tbody=document.getElementById('tbody');
  if(!data.length){
    tbody.innerHTML=`<tr><td colspan="6"><div class="empty">📋 Nenhuma WO carregada.<br>Importe uma planilha Excel para começar.</div></td></tr>`;
    stats(0,0,0,0,0);return;
  }

  let tAC=data.length,tWO=0,dWO=0,sWO=0,fAC=0;

  const html=data.map(ac=>{
    const tasks=ac.tasks||[];
    const done=tasks.filter(t=>t.completed).length;
    const started=tasks.filter(t=>t.started&&!t.completed).length;
    const hasFind=tasks.some(t=>t.has_finding||(t.findings||[]).some(f=>!f.resolved));
    tWO+=tasks.length; dWO+=done; sWO+=started;
    if(hasFind)fAC++;

    const pct=tasks.length?Math.round(done/tasks.length*100):0;
    const woNames=tasks.map(t=>t.wo_number).join(' · ');

    const mo=['TST','NHE','OK',null];
    const mv=tasks.map(t=>t.material);
    let mb=null; for(const m of mo){if(mv.includes(m)){mb=m;break;}}
    const mh=mb==='OK'?`<span class="mtl mtl-ok">OK</span>`:mb==='NHE'?`<span class="mtl mtl-nhe">NHE</span>`:mb==='TST'?`<span class="mtl mtl-tst">TST</span>`:`<span class="mtl mtl-nd">—</span>`;

    let sh;
    if(hasFind)sh=`<span class="badge b-finding">⚠ Finding!</span>`;
    else if(pct===100)sh=`<span class="badge b-done">✓ Concluída</span>`;
    else if(started>0||done>0)sh=`<span class="badge b-started">▶ Andamento</span>`;
    else sh=`<span class="badge b-pending">Aguardando</span>`;

    const isOpen=openPanels.has(ac.id);

    // ---- DETALHE DAS TASKS ----
    const detailHtml=tasks.map(task=>{
      const tFind=task.has_finding||(task.findings||[]).some(f=>!f.resolved);
      const tDone=task.completed;
      const tStarted=task.started&&!tDone;
      const obs=(task.observations||[]).sort((a,b)=>(a.recorded_at||'').localeCompare(b.recorded_at||''));
      const finds=(task.findings||[]);
      const tMtl=task.material;

      const tSt=tDone?`<span class="badge b-done" style="font-size:9px;padding:2px 7px">✓ Concluída</span>`:tFind?`<span class="badge b-finding" style="font-size:9px;padding:2px 7px;animation:none">⚠ Finding</span>`:tStarted?`<span class="badge b-started" style="font-size:9px;padding:2px 7px">▶ Andamento</span>`:`<span class="badge b-pending" style="font-size:9px;padding:2px 7px">Aguardando</span>`;
      const tMb=tMtl==='OK'?`<span class="mtl mtl-ok" style="font-size:9px">OK</span>`:tMtl==='NHE'?`<span class="mtl mtl-nhe" style="font-size:9px">NHE</span>`:tMtl==='TST'?`<span class="mtl mtl-tst" style="font-size:9px">TST</span>`:'';

      const findHtml=finds.map(f=>`<div class="finding-item ${f.resolved?'resolved':'open'}">${f.resolved?'✓':'⚠'} ${f.description||''}</div>`).join('');

      const obsHtml=obs.length
        ?obs.map(o=>`<div class="obs-entry">
            <div class="obs-time">${o.recorded_at||'--:--'}</div>
            <div class="obs-text ${(o.text||'').startsWith('[Líder]')?'lider':''}">${o.text||''}</div>
          </div>`).join('')
        :`<div class="obs-empty">Nenhuma observação ainda</div>`;

      return `<div class="task-item" style="background:${tFind?'#180808':'transparent'}">
        <div class="task-header">
          <span class="task-wo-num">WO ${task.wo_number}</span>
          ${tSt} ${tMb}
        </div>
        <div class="task-desc">${task.description||'—'}</div>
        ${findHtml?`<div style="margin-bottom:6px">${findHtml}</div>`:''}
        <div class="obs-area">
          <div class="obs-label">Observações</div>
          <div class="obs-list">${obsHtml}</div>
          <div class="obs-input-wrap">
            <input class="obs-input" id="obs-inp-${task.id}" placeholder="Líder: adicionar observação..." 
              onkeydown="if(event.key==='Enter')enviarObs('${task.id}')"/>
            <button class="obs-send" onclick="enviarObs('${task.id}')">Enviar</button>
          </div>
        </div>
      </div>`;
    }).join('');

    return `
    <tr class="ac-row ${hasFind?'finding':''}" onclick="toggleDetail('${ac.id}')">
      <td>
        <div style="display:flex;align-items:center">
          <span class="arrow ${isOpen?'open':''}" id="arrow-${ac.id}">▶</span>
          <div>
            <div class="ac-code">${ac.code}</div>
            <div class="ac-tech">👤 ${ac.technician||'—'}</div>
          </div>
        </div>
      </td>
      <td><div class="wo-count">${done}/${tasks.length}</div></td>
      <td><div class="wo-list" title="${woNames}">${woNames||'—'}</div></td>
      <td>
        <div class="prog-cell">
          <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
          <div class="prog-txt">${pct}%</div>
        </div>
      </td>
      <td>${mh}</td>
      <td>${sh}</td>
    </tr>
    <tr class="detail-row" id="detail-${ac.id}" style="display:${isOpen?'table-row':'none'}">
      <td colspan="6">
        <div class="detail-inner">${detailHtml}</div>
      </td>
    </tr>`;
  }).join('');

  tbody.innerHTML=html;
  stats(tAC,tWO,dWO,sWO,fAC);
  document.getElementById('footer').textContent=`⏰ Atualizado em ${new Date().toLocaleTimeString('pt-BR')}`;
}

function toggleDetail(acId){
  if(openPanels.has(acId)) openPanels.delete(acId);
  else openPanels.add(acId);
  const row=document.getElementById(`detail-${acId}`);
  const arrow=document.getElementById(`arrow-${acId}`);
  if(row) row.style.display=openPanels.has(acId)?'table-row':'none';
  if(arrow) arrow.classList.toggle('open', openPanels.has(acId));
}

async function enviarObs(taskId){
  const inp=document.getElementById(`obs-inp-${taskId}`);
  if(!inp)return;
  const texto=inp.value.trim();
  if(!texto)return;
  inp.value='';
  await sb.from('observations').insert([{
    task_id:taskId,
    text:`[Líder] ${texto}`,
    recorded_at:agora()
  }]);
  // Não precisa recarregar - o realtime vai atualizar
}

function stats(ac,total,done,started,findings){
  const pend=total-done-started;
  document.getElementById('k-ac').textContent=ac;
  document.getElementById('k-total').textContent=total;
  document.getElementById('k-done').textContent=done;
  document.getElementById('k-pct').textContent=total?Math.round(done/total*100)+'%':'0%';
  document.getElementById('k-find').textContent=findings;
  document.getElementById('s-done').textContent=`${done} Concluída${done!==1?'s':''}`;
  document.getElementById('s-and').textContent=`${started} Em Andamento`;
  document.getElementById('s-pend').textContent=`${pend} Não Iniciada${pend!==1?'s':''}`;
  document.getElementById('s-find').textContent=`${findings} Aeronave${findings!==1?'s':''} com Finding`;
}

function setConn(on){
  document.getElementById('cdot').className=`conn-dot ${on?'on':'off'}`;
  document.getElementById('clabel').textContent=on?'Conectado ✓':'Desconectado';
}

async function importar(ev){
  const file=ev.target.files[0];if(!file)return;
  document.getElementById('tbody').innerHTML=`<tr><td colspan="6"><div class="loading"><div class="spinner"></div><p>Importando planilha...</p></div></td></tr>`;
  const reader=new FileReader();
  reader.onload=async e=>{
    try{
      const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
      const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,defval:''});
      await sb.from('tasks').delete().neq('id','00000000-0000-0000-0000-000000000000');
      await sb.from('aircrafts').delete().neq('id','00000000-0000-0000-0000-000000000000');
      const map={};
      let tecnicoAtual='Não atribuído';
      const reAC=/^[A-Z]{2}-[A-Z0-9]{2,4}$/;
      rows.forEach(row=>{
        const col0=String(row[0]||'').trim();
        const col1=String(row[1]||'').trim();
        const col2=String(row[2]||'').trim();
        const col3=String(row[3]||'').trim();
        if(!reAC.test(col0))return;
        const isHeader=col3.toUpperCase()==='PRIORIDADE'||col1.toUpperCase().includes('BOX')||col1.includes('|');
        if(isHeader){
          if(col2&&col2.toUpperCase()!=='PRIORIDADE')tecnicoAtual=col2;
          if(!map[col0])map[col0]={code:col0,technician:tecnicoAtual,tasks:[]};
          else map[col0].technician=tecnicoAtual;
          return;
        }
        const wo=col1;
        const desc=col2;
        if(!wo)return;
        const prioridade=col3;
        const descCompleta=prioridade&&prioridade!==desc?`[${prioridade}] ${desc}`:desc;
        if(!map[col0])map[col0]={code:col0,technician:tecnicoAtual,tasks:[]};
        map[col0].tasks.push({wo_number:wo,description:descCompleta});
      });
      for(const ac of Object.values(map)){
        const{data:ins}=await sb.from('aircrafts').insert([{code:ac.code,technician:ac.technician}]).select();
        if(ins?.[0]&&ac.tasks.length)
          await sb.from('tasks').insert(ac.tasks.map(t=>({aircraft_id:ins[0].id,wo_number:t.wo_number,description:t.description})));
      }
      await load();
      alert('✅ Planilha importada!');
    }catch(err){alert('❌ Erro: '+err.message);await load();}
  };
  reader.readAsArrayBuffer(file);
  ev.target.value='';
}

async function exportar(){
  const{data}=await sb.from('aircrafts').select('*,tasks(*,observations(*),findings(*))');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));
  a.download=`wo-backup-${new Date().toISOString().split('T')[0]}.json`;
  a.click();
}

async function encerrarTurno(confirmado=false){
  if(!confirmado){
    if(!confirm('⏹ Encerrar o turno atual?\n\nTodos os dados serão salvos no histórico e o painel será limpo para o próximo turno.'))return;
  }
  await salvarTurno();
}

async function salvarTurno(){
  try{
    const{data:aeros,error}=await sb.from('aircrafts')
      .select('*,tasks(*,findings(*),observations(*))').order('code');
    if(error||!aeros?.length){alert('❌ Nenhum dado para salvar.');return;}

    // Calcular totais do turno
    let tWO=0,dWO=0,fCount=0;
    aeros.forEach(ac=>{
      const tasks=ac.tasks||[];
      tWO+=tasks.length;
      dWO+=tasks.filter(t=>t.completed).length;
      fCount+=tasks.filter(t=>t.has_finding).length;
    });
    const pct=tWO?Math.round(dWO/tWO*100):0;
    const hoje=new Date().toISOString().split('T')[0];

    // Inserir turno
    const{data:turno,error:e2}=await sb.from('turnos').insert([{
      data_turno:hoje,
      inicio:aeros[0]?.tasks?.[0]?.started_at||new Date().toISOString(),
      encerrado_em:new Date().toISOString(),
      total_aero:aeros.length,
      total_wo:tWO,
      wo_concluidas:dWO,
      wo_pendentes:tWO-dWO,
      total_findings:fCount,
      pct_conclusao:pct
    }]).select();
    if(e2)throw e2;
    const turnoId=turno[0].id;

    // Inserir aeronaves e tasks com snapshot completo
    for(const ac of aeros){
      const tasks=ac.tasks||[];
      const done=tasks.filter(t=>t.completed).length;
      const hasFind=tasks.some(t=>t.has_finding);
      const mtlOrd=['TST','NHE','OK',null];
      const mtlVals=tasks.map(t=>t.material);
      let mtlBest=null;
      for(const m of mtlOrd){if(mtlVals.includes(m)){mtlBest=m;break;}}

      const{data:taero}=await sb.from('turno_aeronaves').insert([{
        turno_id:turnoId,
        codigo:ac.code,
        tecnico:ac.technician,
        wo_total:tasks.length,
        wo_concluidas:done,
        wo_pendentes:tasks.length-done,
        pct_conclusao:tasks.length?Math.round(done/tasks.length*100):0,
        tem_finding:hasFind,
        mtl_critico:mtlBest
      }]).select();

      const aeroId=taero?.[0]?.id;
      if(!aeroId)continue;

      // Salvar cada task com obs e findings como JSONB
      for(const task of tasks){
        const obs=(task.observations||[])
          .sort((a,b)=>(a.recorded_at||'').localeCompare(b.recorded_at||''))
          .map(o=>({text:o.text,recorded_at:o.recorded_at}));
        const finds=(task.findings||[])
          .map(f=>({description:f.description,resolved:f.resolved}));

        await sb.from('turno_tarefas').insert([{
          turno_id:turnoId,
          turno_aeronave_id:aeroId,
          wo_number:task.wo_number,
          descricao:task.description,
          concluida:task.completed||false,
          has_finding:task.has_finding||false,
          material:task.material,
          iniciada_em:task.started_at,
          concluida_em:task.completed_at,
          observacoes:obs,
          findings:finds
        }]);
      }
    }

    // Limpar dados atuais
    await sb.from('observations').delete().neq('id','00000000-0000-0000-0000-000000000000');
    await sb.from('findings').delete().neq('id','00000000-0000-0000-0000-000000000000');
    await sb.from('tasks').delete().neq('id','00000000-0000-0000-0000-000000000000');
    await sb.from('aircrafts').delete().neq('id','00000000-0000-0000-0000-000000000000');
    await load();
    if(confirm('✅ Turno encerrado e salvo no histórico!\n\nAbrir página de histórico agora?')){
      window.open('historico.html','_blank');
    }
  }catch(err){
    alert('❌ Erro ao salvar turno: '+err.message);
  }
}

async function limpar(){
  if(!confirm('⚠️ Apagar TODOS os dados? Esta ação não pode ser desfeita.'))return;
  await sb.from('observations').delete().neq('id','00000000-0000-0000-0000-000000000000');
  await sb.from('findings').delete().neq('id','00000000-0000-0000-0000-000000000000');
  await sb.from('tasks').delete().neq('id','00000000-0000-0000-0000-000000000000');
  await sb.from('aircrafts').delete().neq('id','00000000-0000-0000-0000-000000000000');
  await load();
}

// Realtime — mantém painéis abertos ao atualizar
sb.channel('painel-rt')
  .on('postgres_changes',{event:'*',schema:'public',table:'tasks'},load)
  .on('postgres_changes',{event:'*',schema:'public',table:'aircrafts'},load)
  .on('postgres_changes',{event:'*',schema:'public',table:'findings'},load)
  .on('postgres_changes',{event:'*',schema:'public',table:'observations'},load)
  .subscribe(s=>setConn(s==='SUBSCRIBED'));

load();
</script>
